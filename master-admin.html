<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Admin Console</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6fb;
        }
        .master-shell {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
        }
        .master-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .master-header h1 {
            margin: 0;
            font-size: 32px;
            color: #111827;
        }
        .master-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }
        .master-card {
            background: #fff;
            border-radius: 10px;
            padding: 22px;
            box-shadow: 0 12px 30px rgba(15,23,42,0.08);
        }
        .master-card h2 {
            margin-top: 0;
            color: #1f2937;
            font-size: 20px;
        }
        .form-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 12px;
        }
        .form-row label {
            font-size: 13px;
            font-weight: 600;
            color: #374151;
        }
        .form-row input {
            padding: 10px 12px;
            border: 1px solid #cbd5f5;
            border-radius: 6px;
            font-size: 14px;
        }
        .table-wrapper {
            margin-top: 10px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table thead {
            background: #eef2ff;
            font-size: 13px;
        }
        table th, table td {
            padding: 10px 8px;
            border-bottom: 1px solid #e5e7f0;
            text-align: left;
            font-size: 14px;
        }
        table tbody tr:hover {
            background: #f8fafc;
        }
        .master-btn {
            padding: 6px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 6px;
            background: #2563eb;
            color: #fff;
        }
        .master-btn.danger {
            background: #ef4444;
        }
        .master-actions {
            margin-top: 14px;
            display: flex;
            gap: 10px;
        }
        .footer-link {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
        }
        @media (max-width: 600px) {
            .master-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="master-shell">
        <div class="master-header">
            <h1>Master Admin Control</h1>
            <p style="color:#6b7280;">Manage branches and master credentials from one place.</p>
        </div>
        <div class="master-grid">
            <section class="master-card">
                <h2>Branches & Credentials</h2>
                <form id="branchForm">
                    <input type="hidden" id="branchEditId">
                    <div class="form-row">
                        <label for="branchNameInput">Branch Name</label>
                        <input id="branchNameInput" type="text" placeholder="Store / Branch label">
                    </div>
                    <div class="form-row">
                        <label for="branchUserInput">Login Username</label>
                        <input id="branchUserInput" type="text" placeholder="e.g. admin">
                    </div>
                    <div class="form-row">
                        <label for="branchPasswordInput">Login Password</label>
                        <input id="branchPasswordInput" type="password" placeholder="Store password">
                    </div>
                    <div class="master-actions">
                        <button class="master-btn" id="branchSubmitBtn" type="submit">Save Branch</button>
                        <button class="master-btn danger" type="button" onclick="masterAdminResetBranchForm()">Reset</button>
                    </div>
                </form>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Branch</th>
                                <th>ID</th>
                                <th>User</th>
                                <th>Password</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="branchListBody"></tbody>
                    </table>
                </div>
            </section>
            <section class="master-card">
                <h2>Master Admin Credentials</h2>
                <form id="masterAdminForm">
                    <div class="form-row">
                        <label for="masterUserInput">Username</label>
                        <input id="masterUserInput" type="text" placeholder="Master user">
                    </div>
                    <div class="form-row">
                        <label for="masterPassInput">Password</label>
                        <input id="masterPassInput" type="password" placeholder="Master password">
                    </div>
                    <button class="master-btn" type="submit">Save Credentials</button>
                </form>
            </section>
        </div>
        <div class="footer-link">
            <a href="login.html" style="color:#2563eb; text-decoration:none;">Back to Login</a>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="script.js?v=cachefix2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initMasterAdminPage === 'function') initMasterAdminPage();
        });
    </script>
</body>
</html>
