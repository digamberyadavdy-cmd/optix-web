<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Optix Admin Console</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin:0; background:#0f172a; color:#e2e8f0; }
    header { padding:18px 24px; background:#0b1220; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #1f2937;}
    h1 { margin:0; font-size:20px; letter-spacing:0.5px; }
    .chip { background:#22c55e33; color:#22c55e; padding:6px 10px; border-radius:20px; font-size:12px; border:1px solid #22c55e55; }
    main { padding:20px 24px; }
    .card { background:#111827; border:1px solid #1f2937; border-radius:10px; padding:16px; margin-bottom:16px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; }
    .row label { display:block; font-size:12px; color:#94a3b8; margin-bottom:4px; }
    input, select, textarea { width:100%; padding:10px; border-radius:8px; border:1px solid #1f2937; background:#0b1220; color:#e2e8f0; }
    button { background:#2563eb; color:white; border:none; padding:10px 16px; border-radius:8px; cursor:pointer; font-weight:600; }
    button:hover { background:#1d4ed8; }
    table { width:100%; border-collapse:collapse; margin-top:12px; }
    th, td { padding:10px; border-bottom:1px solid #1f2937; text-align:left; font-size:14px; }
    th { color:#cbd5e1; }
    .pill { padding:4px 8px; border-radius:999px; font-size:12px; display:inline-block; }
    .pill.active { background:#22c55e33; color:#22c55e; border:1px solid #22c55e55; }
    .pill.inactive { background:#ef444433; color:#ef4444; border:1px solid #ef444455; }
    .text-muted { color:#94a3b8; font-size:12px; }
    .actions button { margin-right:6px; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <header>
    <div>
      <h1>Optix Admin Console</h1>
      <div class="text-muted">Super-admin view · Not visible to stores</div>
    </div>
    <div class="chip" id="adminUserChip">Checking...</div>
  </header>

  <main>
    <section class="card">
      <h3 style="margin:0 0 12px 0;">Create / Update Store</h3>
      <div class="row">
        <div style="flex:1 1 140px;">
          <label>Store ID</label>
          <input id="storeId" placeholder="store-01">
        </div>
        <div style="flex:1 1 200px;">
          <label>Store Name</label>
          <input id="storeName" placeholder="Downtown Optics">
        </div>
        <div style="flex:1 1 200px;">
          <label>Owner Email</label>
          <input id="ownerEmail" placeholder="owner@example.com">
        </div>
        <div style="flex:1 1 140px;">
          <label>Plan</label>
          <select id="plan">
            <option value="lite">Lite</option>
            <option value="pro">Pro</option>
            <option value="plus">Plus</option>
          </select>
        </div>
        <div style="flex:1 1 140px;">
          <label>Status</label>
          <select id="status">
            <option value="active">Active</option>
            <option value="paused">Paused</option>
            <option value="trial">Trial</option>
          </select>
        </div>
        <div style="flex:1 1 200px;">
          <label>Active Until (YYYY-MM-DD)</label>
          <input id="activeUntil" placeholder="2026-12-31">
        </div>
      </div>
      <div style="margin-top:10px;">
        <label>Notes</label>
        <textarea id="notes" rows="2" placeholder="Internal notes, billing remarks"></textarea>
      </div>
      <div style="margin-top:12px;">
        <button onclick="saveStore()">Save Store</button>
      </div>
      <div id="formMessage" class="text-muted" style="margin-top:8px;"></div>
    </section>

    <section class="card">
      <h3 style="margin:0 0 12px 0;">Stores</h3>
      <div class="text-muted" id="storeCount"></div>
      <table>
        <thead>
          <tr>
            <th>Store</th>
            <th>Owner Email</th>
            <th>Plan</th>
            <th>Status</th>
            <th>Active Until</th>
            <th>Updated</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="storeTableBody">
          <tr><td colspan="7" class="text-muted">Loading...</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
